name: 🚀 Deploy to 2026.ommatic.net

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: FTP Deploy (changed files)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Need previous commit for diff

      - name: Determine changed files
        id: changed
        run: |
          # On first push (no parent), deploy everything
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD)
          else
            echo "First push – deploying all files"
            FILES=$(git ls-files)
          fi

          # Filter out non-deployable paths
          DEPLOY=$(echo "$FILES" | grep -vE \
            '^\.github/|^scripts/|^crawl/|^\.git|\.env$|\.md$|\.sh$|^\.gitignore$|^README')

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$DEPLOY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "=== Files to deploy ==="
          echo "$DEPLOY"
          echo "========================"
          echo "Total: $(echo "$DEPLOY" | grep -c . || echo 0)"

      - name: Upload via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          echo "${{ steps.changed.outputs.files }}" | while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            dir=$(dirname "$file")
            echo "📤 Uploading: $file"
            curl --silent --show-error \
                 --ftp-create-dirs \
                 -T "$file" \
                 "ftp://${FTP_HOST}/${file}" \
                 --user "${FTP_USER}:${FTP_PASS}" \
              && echo "   ✅ OK" \
              || echo "   ❌ FAILED: $file"
          done

      - name: Summary
        run: |
          COUNT=$(echo "${{ steps.changed.outputs.files }}" | grep -c . || echo 0)
          echo "### 🚀 Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "**$COUNT files** deployed to \`2026.ommatic.net\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.changed.outputs.files }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
